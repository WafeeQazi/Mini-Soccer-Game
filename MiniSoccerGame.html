<!DOCTYPE html>
<html>
<head>
<title>Soccer Game</title>
<style>
body { margin:0; background:green; text-align:center; color:white; font-family:sans-serif; }
canvas { display:block; margin:auto; background:#228B22; }
</style>
</head>
<body>

<h2 id="timer">Time: 60</h2>
<h2 id="kickoff"></h2>
<canvas id="gameCanvas" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const timerText = document.getElementById("timer");
const kickoffText = document.getElementById("kickoff");

let player = { x:100, y:200, radius:15, speed:4 };
let ai = { x:500, y:200, radius:15, speed:2 };
let ball = { x:300, y:200, radius:10, vx:2, vy:1 };

let score = { player:0, ai:0 };
let timeLeft = 60;

let kickoff = false;
let kickoffTimer = 0;

setInterval(()=>{
    if(timeLeft > 0 && !kickoff){
        timeLeft--;
        timerText.textContent = "Time: " + timeLeft;
    }
},1000);

let keys = {};
document.addEventListener("keydown", e => keys[e.key]=true);
document.addEventListener("keyup", e => keys[e.key]=false);

function movePlayer(){
    if(kickoff) return;
    if(keys["ArrowUp"]) player.y -= player.speed;
    if(keys["ArrowDown"]) player.y += player.speed;
    if(keys["ArrowLeft"]) player.x -= player.speed;
    if(keys["ArrowRight"]) player.x += player.speed;
}

function moveAI(){
    if(kickoff) return;
    let dx = ball.x - ai.x;
    let dy = ball.y - ai.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    if(dist > 0){
        ai.x += (dx/dist) * ai.speed;
        ai.y += (dy/dist) * ai.speed;
    }
}

function moveBall(){
    if(kickoff) return;
    ball.x += ball.vx;
    ball.y += ball.vy;
    ball.vx *= 0.98;
    ball.vy *= 0.98;
}

function playerBallCollision(){
    if(kickoff) return;
    let dx = ball.x - player.x;
    let dy = ball.y - player.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    if(dist < player.radius + ball.radius){
        let angle = Math.atan2(dy, dx);
        ball.vx += Math.cos(angle)*3;
        ball.vy += Math.sin(angle)*3;
    }
}

function aiBallCollision(){
    if(kickoff) return;
    let dx = ball.x - ai.x;
    let dy = ball.y - ai.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    if(dist < ai.radius + ball.radius){
        let angle = Math.atan2(dy, dx);
        ball.vx += Math.cos(angle)*3;
        ball.vy += Math.sin(angle)*3;
    }
}

function startKickoff(){
    kickoff = true;
    kickoffTimer = 3;
    kickoffText.textContent = "Kickoff in " + kickoffTimer;

    let interval = setInterval(()=>{
        kickoffTimer--;
        kickoffText.textContent = "Kickoff in " + kickoffTimer;
        if(kickoffTimer <= 0){
            kickoff = false;
            kickoffText.textContent = "";
            clearInterval(interval);
        }
    },1000);
}

function checkGoal(){
    if(ball.x < 0){
        score.ai++;
        reset();
        startKickoff();
    }
    if(ball.x > canvas.width){
        score.player++;
        reset();
        startKickoff();
    }
}

function reset(){
    player.x=100; player.y=200;
    ai.x=500; ai.y=200;
    ball.x=300; ball.y=200;
    ball.vx=0; ball.vy=0;
}

function drawField(){
    ctx.fillStyle="#228B22";
    ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawCircle(obj,color){
    ctx.beginPath();
    ctx.arc(obj.x,obj.y,obj.radius,0,Math.PI*2);
    ctx.fillStyle=color;
    ctx.fill();
}

function gameLoop(){
    drawField();
    movePlayer();
    moveAI();
    moveBall();
    playerBallCollision();
    aiBallCollision();
    checkGoal();
    drawCircle(player,"blue");
    drawCircle(ai,"red");
    drawCircle(ball,"white");
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
