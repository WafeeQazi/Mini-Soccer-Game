<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Soccer Game</title>
<style>
body { margin:0; background:green; display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; }
canvas { background:#228B22; border:2px solid #fff; }
#scoreboard { font-size:24px; color:white; margin-top:10px; }
#timerDisplay { font-size:20px; color:white; margin-top:5px; }
#restartButton { margin-top:10px; padding:10px 20px; font-size:16px; cursor:pointer; }
</style>
</head>
<body>
<div id="scoreboard">Player: 0 | AI: 0</div>
<div id="timerDisplay">Time: 01:00</div>
<canvas id="soccerField" width="600" height="400"></canvas>
<button id="restartButton">Restart Game</button>

<script>
// Game objects
const canvas = document.getElementById('soccerField');
const ctx = canvas.getContext('2d');
const scoreboard = document.getElementById('scoreboard');
const timerDisplay = document.getElementById('timerDisplay');
const restartButton = document.getElementById('restartButton');

// Starting positions
const playerStartPos = { x:50, y:200 };
const aiStartPos = { x:550, y:200 };
const ballStartPos = { x:300, y:200 };

// Player & AI objects
let humanPlayer = {...playerStartPos, radius:15, color:'blue', speed:4};
let computerAI = {...aiStartPos, radius:15, color:'red', speed:3};
let soccerBall = {...ballStartPos, radius:10, color:'white', vx:0, vy:0};

// Game state
let keysPressed = {};
let scores = { player:0, ai:0 };
let remainingTime = 60;
let isGameOver = false;
let isKickoff = false;
let kickoffTimer = 0;
let aiPushCooldown = 0;

// Event listeners
document.addEventListener('keydown', e => keysPressed[e.key]=true);
document.addEventListener('keyup', e => keysPressed[e.key]=false);

restartButton.addEventListener('click', ()=>{
    scores = { player:0, ai:0 };
    remainingTime = 60;
    isGameOver = false;
    isKickoff = false;
    kickoffTimer = 0;
    aiPushCooldown = 0;
    humanPlayer = {...playerStartPos, radius:15, color:'blue', speed:4};
    computerAI = {...aiStartPos, radius:15, color:'red', speed:3};
    soccerBall = {...ballStartPos, radius:10, color:'white', vx:0, vy:0};
    updateScoreAndTimer();
});

// Utility
function updateScoreAndTimer(){
    scoreboard.textContent = `Player: ${scores.player} | AI: ${scores.ai}`;
    const minutes = String(Math.floor(remainingTime/60)).padStart(2,'0');
    const seconds = String(remainingTime%60).padStart(2,'0');
    timerDisplay.textContent = `Time: ${minutes}:${seconds}`;
}

// Game countdown
setInterval(()=>{
    if(!isGameOver && !isKickoff){
        remainingTime--;
        if(remainingTime<=0){ remainingTime=0; isGameOver=true; }
        updateScoreAndTimer();
    }
},1000);

// Movement functions
function movePlayer(){
    if(isKickoff || isGameOver) return;
    if(keysPressed['ArrowUp']) humanPlayer.y -= humanPlayer.speed;
    if(keysPressed['ArrowDown']) humanPlayer.y += humanPlayer.speed;
    if(keysPressed['ArrowLeft']) humanPlayer.x -= humanPlayer.speed;
    if(keysPressed['ArrowRight']) humanPlayer.x += humanPlayer.speed;

    humanPlayer.x = Math.max(humanPlayer.radius, Math.min(canvas.width-humanPlayer.radius, humanPlayer.x));
    humanPlayer.y = Math.max(humanPlayer.radius, Math.min(canvas.height-humanPlayer.radius, humanPlayer.y));
}

function moveAI(){
    if(isKickoff || isGameOver) return;

    let dx = soccerBall.x - computerAI.x;
    let dy = soccerBall.y - computerAI.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    if(dist>1){
        computerAI.x += dx/dist * computerAI.speed;
        computerAI.y += dy/dist * computerAI.speed;
    }

    computerAI.x = Math.max(computerAI.radius, Math.min(canvas.width-computerAI.radius, computerAI.x));
    computerAI.y = Math.max(computerAI.radius, Math.min(canvas.height-computerAI.radius, computerAI.y));
}

function moveBall(){
    if(isKickoff || isGameOver) return;
    soccerBall.x += soccerBall.vx;
    soccerBall.y += soccerBall.vy;
    soccerBall.vx *= 0.95;
    soccerBall.vy *= 0.95;

    const goalTop = canvas.height/2 - 50;
    const goalBottom = canvas.height/2 + 50;
    if(soccerBall.y-soccerBall.radius<0){ soccerBall.y=soccerBall.radius; soccerBall.vy*=-1; }
    if(soccerBall.y+soccerBall.radius>canvas.height){ soccerBall.y=canvas.height-soccerBall.radius; soccerBall.vy*=-1; }
    if(soccerBall.x-soccerBall.radius<0 && (soccerBall.y<goalTop || soccerBall.y>goalBottom)){ soccerBall.x=soccerBall.radius; soccerBall.vx*=-1; }
    if(soccerBall.x+soccerBall.radius>canvas.width && (soccerBall.y<goalTop || soccerBall.y>goalBottom)){ soccerBall.x=canvas.width-soccerBall.radius; soccerBall.vx*=-1; }
}

// Collision & scoring
function checkCollision(playerOrAI){
    if(isKickoff || isGameOver) return;
    const dx = soccerBall.x-playerOrAI.x;
    const dy = soccerBall.y-playerOrAI.y;
    const dist = Math.sqrt(dx*dx+dy*dy);

    if(dist < soccerBall.radius + playerOrAI.radius){
        let angle = Math.atan2(dy, dx);
        const force = 3;
        soccerBall.vx += Math.cos(angle)*force;
        soccerBall.vy += Math.sin(angle)*force;
        const overlap = soccerBall.radius + playerOrAI.radius - dist;
        soccerBall.x += Math.cos(angle)*overlap*0.5;
        soccerBall.y += Math.sin(angle)*overlap*0.5;
    }
}

function checkGoal(){
    if(isGameOver || isKickoff) return;
    const goalTop = canvas.height/2 - 50;
    const goalBottom = canvas.height/2 + 50;

    if(soccerBall.x-soccerBall.radius<=0 && soccerBall.y>goalTop && soccerBall.y<goalBottom){
        scores.ai++;
        startKickoff();
    }
    if(soccerBall.x+soccerBall.radius>=canvas.width && soccerBall.y>goalTop && soccerBall.y<goalBottom){
        scores.player++;
        startKickoff();
    }
    updateScoreAndTimer();
}

// Kickoff
function startKickoff(){
    isKickoff = true;
    kickoffTimer = 3;
    resetPositions();
    const countdownInterval = setInterval(()=>{
        kickoffTimer--;
        if(kickoffTimer<=0){
            isKickoff = false;
            clearInterval(countdownInterval);
        }
    },1000);
}

function resetPositions(){
    humanPlayer.x=playerStartPos.x; humanPlayer.y=playerStartPos.y;
    computerAI.x=aiStartPos.x; computerAI.y=aiStartPos.y;
    soccerBall.x=ballStartPos.x; soccerBall.y=ballStartPos.y;
    soccerBall.vx=0; soccerBall.vy=0;
    aiPushCooldown=0;
}

// Drawing
function drawCircle(entity, withShadow=false){
    if(withShadow){
        ctx.save();
        ctx.shadowColor = "rgba(0,0,0,0.5)";
        ctx.shadowBlur = 8;
    }
    ctx.beginPath();
    ctx.arc(entity.x, entity.y, entity.radius, 0, Math.PI*2);
    ctx.fillStyle = entity.color;
    ctx.fill();
    if(withShadow) ctx.restore();
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle='#fff';
    ctx.fillRect(0,canvas.height/2-50,10,100);
    ctx.fillRect(canvas.width-10,canvas.height/2-50,10,100);
    ctx.strokeStyle='white';
    ctx.setLineDash([10,10]);
    ctx.beginPath();
    ctx.moveTo(canvas.width/2,0);
    ctx.lineTo(canvas.width/2,canvas.height);
    ctx.stroke();
    ctx.setLineDash([]);

    drawCircle(humanPlayer);
    drawCircle(computerAI);
    drawCircle(soccerBall,true);

    if(isKickoff){
        ctx.fillStyle='white';
        ctx.font='40px sans-serif';
        ctx.textAlign='center';
        ctx.fillText(`Kickoff in ${kickoffTimer}`, canvas.width/2, canvas.height/2);
    }
}

// Game loop
function gameLoop(){
    if(aiPushCooldown>0) aiPushCooldown--;
    movePlayer();
    moveAI();
    moveBall();
    checkCollision(humanPlayer);
    checkCollision(computerAI);
    checkGoal();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
