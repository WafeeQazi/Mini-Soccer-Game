<!DOCTYPE html>
<html>
<head>
<title>Soccer Game</title>
<style>
body {
    margin:0;
    background:green;
    text-align:center;
    color:white;
    font-family:sans-serif;
}
canvas {
    display:block;
    margin:auto;
    background:#228B22;
}
#score {
    font-size:20px;
    margin-top:10px;
}
button {
    margin-top:10px;
    padding:8px 15px;
}
</style>
</head>
<body>

<div id="score">Player: 0 | AI: 0</div>
<button id="restart">Restart</button>

<canvas id="gameCanvas" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreText = document.getElementById("score");
const restartBtn = document.getElementById("restart");

let player = { x:100, y:200, r:15, speed:4 };
let ai = { x:500, y:200, r:15, speed:2 };
let ball = { x:300, y:200, r:10, vx:0, vy:0 };

let score = { player:0, ai:0 };

restartBtn.onclick = ()=>{
    score.player = 0;
    score.ai = 0;
    reset();
};

let keys = {};
document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>keys[e.key]=false);

function movePlayer(){
    if(keys["ArrowUp"]) player.y -= player.speed;
    if(keys["ArrowDown"]) player.y += player.speed;
    if(keys["ArrowLeft"]) player.x -= player.speed;
    if(keys["ArrowRight"]) player.x += player.speed;
}

function moveAI(){
    let dx = ball.x - ai.x;
    let dy = ball.y - ai.y;
    let d = Math.sqrt(dx*dx+dy*dy);
    if(d>0){
        ai.x += dx/d * ai.speed;
        ai.y += dy/d * ai.speed;
    }
}

function moveBall(){
    ball.x += ball.vx;
    ball.y += ball.vy;
    ball.vx *= 0.96;
    ball.vy *= 0.96;
}

function collide(p){
    let dx = ball.x - p.x;
    let dy = ball.y - p.y;
    let d = Math.sqrt(dx*dx+dy*dy);
    if(d < p.r + ball.r){
        let a = Math.atan2(dy,dx);
        ball.vx += Math.cos(a)*3;
        ball.vy += Math.sin(a)*3;
    }
}

function checkGoal(){
    if(ball.x < 0){
        score.ai++;
        reset();
    }
    if(ball.x > canvas.width){
        score.player++;
        reset();
    }
    scoreText.textContent = `Player: ${score.player} | AI: ${score.ai}`;
}

function reset(){
    player.x=100; player.y=200;
    ai.x=500; ai.y=200;
    ball.x=300; ball.y=200;
    ball.vx=0; ball.vy=0;
}

function drawCircle(o,c){
    ctx.beginPath();
    ctx.arc(o.x,o.y,o.r,0,Math.PI*2);
    ctx.fillStyle=c;
    ctx.fill();
}

function draw(){
    ctx.fillStyle="#228B22";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    drawCircle(player,"blue");
    drawCircle(ai,"red");
    drawCircle(ball,"white");
}

function loop(){
    movePlayer();
    moveAI();
    moveBall();
    collide(player);
    collide(ai);
    checkGoal();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
