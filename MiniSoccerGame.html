<!DOCTYPE html>
<html>
<head>
<title>Soccer Game</title>
<style>
body {
    margin: 0;
    background: green;
}
canvas {
    display: block;
    margin: auto;
    background: #228B22;
}
</style>
</head>
<body>

<canvas id="gameCanvas" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// player setup
let player = {
    x: 100,
    y: 200,
    radius: 15
};

function drawField(){
    ctx.fillStyle = "#228B22";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawPlayer(){
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
    ctx.fillStyle = "blue";
    ctx.fill();
}

function gameLoop(){
    drawField();
    drawPlayer();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
